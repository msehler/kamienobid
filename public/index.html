<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kamieno | Legal Bidding Platform</title>
    <meta
      name="description"
      content="Kamieno helps you post your legal matter once and compare proposals from verified lawyers before you choose."
    />
    <link rel="icon" href="/assets/favicon-symbol.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="home">
    <div class="page-grid"></div>
    <div class="ambient-orb ambient-orb-left"></div>
    <div class="ambient-orb ambient-orb-right"></div>
    <div class="status-toast" id="statusToast" aria-live="polite"></div>

    <header class="site-header reveal">
      <div class="brand-row">
        <a href="/" class="brand-mark" aria-label="Kamieno home">
          <img src="/assets/site-wordmark-symbol.svg" alt="Kamieno" />
        </a>
        <nav class="main-nav">
          <a href="/account">Account</a>
          <a href="/client">Client</a>
          <a href="/lawyer">Lawyer</a>
          <a href="/admin">Admin</a>
        </nav>
        <div class="auth-quick" id="authQuick"></div>
      </div>
    </header>

    <main id="top">
      <section class="home-hero reveal">
        <article class="home-hero-panel">
          <div class="home-hero-topline">
            <p class="eyebrow" id="heroEyebrow"></p>
            <span class="home-jurisdiction-chip">Detected region: <strong id="jurisdictionBadge"></strong></span>
          </div>
          <div class="home-hero-copy">
            <h1 class="home-hero-title">
              Find the right lawyer
              <span>before you commit.</span>
            </h1>
            <p class="home-hero-description" id="heroDescription"></p>
          </div>
          <div class="home-hero-actions">
            <a class="button primary" href="/account">Get started</a>
            <a class="button secondary" href="/client">Post a matter</a>
          </div>
        </article>
      </section>

      <section class="home-steps reveal" aria-label="How Kamieno works">
        <div class="home-steps-grid">
          <article class="home-step-card">
            <h2>Post once</h2>
          </article>
          <article class="home-step-card">
            <h2>Compare proposals</h2>
          </article>
          <article class="home-step-card">
            <h2>Choose your lawyer</h2>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer reveal">
      <div class="footer-copy">
        <p class="eyebrow">Live disclaimer</p>
        <p id="globalDisclaimer"></p>
      </div>
      <div class="footer-meta">
        <p>&copy; 2026 Kamieno. All rights reserved.</p>
        <a href="/terms">Terms of Use</a>
      </div>
    </footer>

    <script src="/app.js" defer></script>
  </body>
</html>
